<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Duel - Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
</head>
<body>
    <!-- Matchmaking UI -->
    <div id="matchmaking-overlay">
        <div class="matchmaking-box">
            <div id="connection-status">
                <div class="spinner"></div>
                <p>Initializing Network...</p>
            </div>
            
            <div id="menu-buttons" class="hidden">
                <button id="btn-host">CREATE MULTIPLAYER MATCH</button>
                <div style="margin-top: 10px;">
                    <button id="btn-offline" style="background: #eee;">PLAY LOCAL (TEST)</button>
                </div>
            </div>

            <div id="lobby-screen" class="hidden">
                <h2 style="color: blue; margin-bottom: 1rem;">YOUR INVITE LINK:</h2>
                <input type="text" id="invite-link-display" readonly>
                <button id="btn-copy">COPY LINK</button>
                <div style="margin-top: 2rem;">
                    <div class="spinner"></div>
                    <p style="color: #000; margin-top: 1rem;">Waiting for opponent...</p>
                </div>
            </div>

            <div id="joining-screen" class="hidden">
                <h2 style="color: red; margin-bottom: 2rem;">JOINING MATCH...</h2>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Main Game -->
    <div id="game-container">
        <!-- Player 1 Side -->
        <div id="p1-side" class="player-side">
            <div class="hud">
                <div class="status-box">
                    <span id="p1-mines">000</span>
                </div>
            </div>
            <div id="p1-board" class="minesweeper-board"></div>
            <div id="p1-overlay" class="penalty-overlay hidden">
                <span class="penalty-timer">LOSS</span>
            </div>
        </div>

        <!-- Center Divider -->
        <div id="divider">
            <div class="timer">VS</div>
        </div>

        <!-- Player 2 Side -->
        <div id="p2-side" class="player-side">
            <div class="hud">
                <div class="status-box">
                    <span id="p2-mines">000</span>
                </div>
            </div>
            <div id="p2-board" class="minesweeper-board"></div>
            <div id="p2-overlay" class="penalty-overlay hidden">
                <span class="penalty-timer">LOSS</span>
            </div>
        </div>
    </div>
    
    <div id="winner-modal" class="hidden">
        <div class="matchmaking-box" style="min-width: 300px;">
            <h1 id="winner-text" style="margin-bottom: 20px;">WINS</h1>
            <button id="rematch-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
