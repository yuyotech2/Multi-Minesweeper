<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Sweeper: Duel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Player 1 Side -->
        <div id="p1-side" class="player-side p1-theme">
            <div class="hud">
                <div class="player-name">PLAYER 1</div>
                <div class="status-box">
                    <span id="p1-mines">Mines: 40</span>
                </div>
            </div>
            <div id="p1-board" class="minesweeper-board"></div>
            <div id="p1-overlay" class="penalty-overlay hidden">
                SYSTEM REBOOTING<br><span class="penalty-timer">5</span>
            </div>
        </div>

        <!-- Center Divider -->
        <div id="divider">
            <div class="timer">DUEL</div>
            <button id="start-btn">START</button>
        </div>

        <!-- Player 2 Side -->
        <div id="p2-side" class="player-side p2-theme">
            <div class="hud">
                <div class="player-name">PLAYER 2</div>
                <div class="status-box">
                    <span id="p2-mines">Mines: 40</span>
                </div>
            </div>
            <div id="p2-board" class="minesweeper-board"></div>
            <div id="p2-overlay" class="penalty-overlay hidden">
                SYSTEM REBOOTING<br><span class="penalty-timer">5</span>
            </div>
        </div>
    </div>
    
    <div id="winner-modal" class="hidden">
        <h1 id="winner-text">PLAYER 1 WINS</h1>
        <button id="rematch-btn">REMATCH</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
